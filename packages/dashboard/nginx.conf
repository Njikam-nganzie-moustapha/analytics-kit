server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Reverse proxy: query-api ─────────────────────────────────────────────
    # Dashboard fetches /api/* → strip prefix → query-api:4211
    location /api/ {
        proxy_pass         http://query-api:4211/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward auth header as-is
        proxy_pass_header  X-Api-Key;
    }

    # ── Reverse proxy: collector (SDK event ingestion) ───────────────────────
    # Lets the tracking SDK point to the same origin — no CORS needed
    location /e {
        proxy_pass         http://collector:4210/e;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA client-side routing ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Immutable cache for hashed Vite assets ───────────────────────────────
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
